<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELAZ — AGÊNCIA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: 'Playfair Display', serif;
  background:#02040a;
  color:#fff;
  overflow-x:hidden;
}

/* PARTICLES BACKGROUND */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* HERO */
header{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:radial-gradient(circle at 30% 20%, rgba(0,140,255,0.25), transparent 60%),
             radial-gradient(circle at 70% 80%, rgba(100,120,150,0.2), transparent 60%),
             #02040a;
}

header h1{
  font-size:4.5em;
  letter-spacing:3px;
}

header span{
  color:#00aaff;
}

header p{
  margin-top:15px;
  color:#aaa;
  font-size:1.2em;
}

.btn{
  margin-top:30px;
  padding:16px 40px;
  border-radius:14px;
  text-decoration:none;
  color:#fff;
  font-weight:600;
  background:linear-gradient(135deg,#00aaff,#6d7f95);
  transition:.4s;
}

.btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 40px rgba(0,170,255,0.6);
}

/* SECTIONS */
section{
  padding:100px 20px;
  max-width:1200px;
  margin:auto;
  opacity:0;
  transform:translateY(60px);
  transition:1s;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

h2{
  text-align:center;
  margin-bottom:60px;
  font-size:2.5em;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
}

.card{
  background:rgba(15,20,35,0.6);
  backdrop-filter:blur(12px);
  padding:35px;
  border-radius:20px;
  transition:.4s;
  border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 0 40px rgba(0,170,255,0.3);
}

/* PORTFOLIO */
.portfolio img{
  width:100%;
  border-radius:15px;
}

/* BEFORE AFTER */
.compare{
  position:relative;
  max-width:800px;
  margin:auto;
}
.compare img{width:100%;display:block;border-radius:15px}
.compare .after{
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}
.slider{
  position:absolute;
  top:0;
  left:50%;
  width:4px;
  height:100%;
  background:#00aaff;
  cursor:ew-resize;
}

/* CLIENT AREA */
.client{
  text-align:center;
  background:rgba(10,15,30,0.7);
  padding:50px;
  border-radius:20px;
}

input{
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  border:none;
  width:250px;
}

/* FLOAT BUTTON */
.whats{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#00aaff;
  padding:18px;
  border-radius:50%;
  text-decoration:none;
  color:#fff;
  font-size:22px;
  box-shadow:0 0 25px #00aaff;
}

footer{
  text-align:center;
  padding:40px;
  color:#666;
}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<header>
  <h1>DELAZ <span>AGÊNCIA</span></h1>
  <p>Design que domina atenção e gera clientes</p>
  <a class="btn" href="https://wa.me/SEUNUMERO">Falar no WhatsApp</a>
</header>

<section>
  <h2>Serviços</h2>
  <div class="grid">
    <div class="card">Design de alto impacto</div>
    <div class="card">Posts que vendem</div>
    <div class="card">Estratégia de Instagram</div>
  </div>
</section>

<section>
  <h2>Portfólio</h2>
  <div class="grid portfolio">
    <div class="card"><img src="https://i.imgur.com/ZZzdvRu.png"></div>
    <div class="card"><img src="https://i.imgur.com/Q30sDC3.png"></div>
    <div class="card"><img src="https://i.imgur.com/qUse1Al.png"></div>
  </div>
</section>

<section>
  <h2>Antes / Depois</h2>

  <div class="compare">
    <!-- IMAGEM ANTES -->
    <img src="https://i.imgur.com/XpH6pLI.png" class="before">

    <!-- IMAGEM DEPOIS -->
    <div class="after" id="after">
      <img src="https://i.imgur.com/XoWVC1r.png">
    </div>

    <!-- LINHA DO SLIDER -->
    <div class="slider" id="slider"></div>
  </div>
</section>
<a class="whats" href="https://wa.me/SEUNUMERO">💬</a>

<footer>
© 2026 DELAZ
</footer>

<script>

// PARTICLES
const c=document.getElementById('bg');
const ctx=c.getContext('2d');
c.width=window.innerWidth;
c.height=window.innerHeight;
let p=[];
for(let i=0;i<100;i++){p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2})}
function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle='#00aaff';
p.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();
e.y+=0.2;
if(e.y>c.height)e.y=0;
});
requestAnimationFrame(draw);
}
draw();

// SCROLL
const secs=document.querySelectorAll('section');
window.addEventListener('scroll',()=>{
secs.forEach(s=>{
if(s.getBoundingClientRect().top<window.innerHeight-100){s.classList.add('show')}
});
});

// BEFORE AFTER
let slider=document.getElementById('slider');
let after=document.getElementById('after');
let drag=false;
slider.addEventListener('mousedown',()=>drag=true);
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',(e)=>{
if(drag){
let x=e.clientX;
slider.style.left=x+'px';
after.style.width=x+'px';
}
});

</script>

</body>
</html>
